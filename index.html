<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Audit Intelligence Tool</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #f8fafc;
            color: #1e293b;
            margin: 0;
            padding: 40px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .header {
            text-align: center;
            margin-bottom: 40px;
        }

        .header h1 {
            color: #0f172a;
            font-size: 32px;
            font-weight: 800;
            margin: 0 0 10px 0;
        }

        .header p {
            color: #64748b;
            font-size: 16px;
            margin: 0;
        }

        .container {
            width: 100%;
            max-width: 1200px;
        }

        .input-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 20px;
        }

        .card {
            background: #ffffff;
            border: 1px solid #e2e8f0;
            border-radius: 12px;
            padding: 24px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05);
        }

        .card-title {
            font-size: 12px;
            font-weight: 700;
            color: #64748b;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 15px;
        }

        textarea {
            width: 100%;
            height: 250px;
            border: 1px solid #cbd5e1;
            border-radius: 8px;
            padding: 15px;
            font-family: monospace;
            font-size: 13px;
            color: #334155;
            resize: none;
            box-sizing: border-box;
            background-color: #f8fafc;
        }

        textarea:focus {
            outline: none;
            border-color: #3b82f6;
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1);
        }

        .btn {
            width: 100%;
            background-color: #2563eb;
            color: white;
            border: none;
            padding: 16px;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: 0.2s;
            margin-bottom: 20px;
        }

        .btn:hover {
            background-color: #1d4ed8;
        }

        .banner {
            width: 100%;
            background-color: #fef2f2;
            border: 1px solid #fecaca;
            color: #ef4444;
            padding: 16px;
            border-radius: 8px;
            text-align: center;
            font-weight: 800;
            font-size: 18px;
            margin-bottom: 20px;
            display: none;
        }

        .results-row {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 20px;
        }

        .result-col {
            background: #ffffff;
            border: 1px solid #e2e8f0;
            border-radius: 12px;
            padding: 24px;
            min-height: 200px;
        }

        .col-header {
            font-weight: 800;
            font-size: 14px;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .col-red { color: #ef4444; }
        .col-blue { color: #2563eb; }
        .col-purple { color: #8b5cf6; }

        .item-list {
            list-style-type: none;
            padding: 0;
            margin: 0;
        }

        .item-list li {
            font-size: 13px;
            color: #334155;
            padding: 12px 0;
            border-bottom: 1px solid #f1f5f9;
            line-height: 1.5;
        }

        .item-list li:last-child {
            border-bottom: none;
        }

        .empty-state {
            font-size: 13px;
            color: #94a3b8;
            font-style: italic;
        }

        .system-footer {
            text-align: center;
            margin-top: 40px;
            font-size: 12px;
            font-weight: 700;
            color: #94a3b8;
            letter-spacing: 1.5px;
        }
    </style>
</head>
<body>

    <div class="header">
        <h1>Audit Intelligence Tool</h1>
        <p>Analyze and categorize customer refund claims instantly</p>
    </div>

    <div class="container">
        <div class="input-row">
            <div class="card">
                <div class="card-title">MASTER ORDERED LIST</div>
                <textarea id="masterData" placeholder="Paste full order list here..."></textarea>
            </div>
            <div class="card">
                <div class="card-title">REFUND CLAIM DATA</div>
                <textarea id="claimData" placeholder="Paste customer claim JSON here..."></textarea>
            </div>
        </div>

        <button class="btn" onclick="runAnalysis()">Run Audit Analysis</button>

        <div id="alertBanner" class="banner"></div>

        <div class="results-row">
            <div class="result-col">
                <div class="col-header col-red">🔴 SCANNED ITEMS</div>
                <ul id="listScanned" class="item-list">
                    <li class="empty-state">No items detected</li>
                </ul>
            </div>
            <div class="result-col">
                <div class="col-header col-blue">🔘 NOT SCANNED</div>
                <ul id="listNotScanned" class="item-list">
                    <li class="empty-state">No items detected</li>
                </ul>
            </div>
            <div class="result-col">
                <div class="col-header col-purple">🔄 SUBSTITUTED</div>
                <ul id="listSubstituted" class="item-list">
                    <li class="empty-state">No items detected</li>
                </ul>
            </div>
        </div>
        
        <div class="system-footer">
            DEVELOPED BY HANISH
        </div>
    </div>

<script>
function runAnalysis() {
    try {
        const masterRaw = document.getElementById('masterData').value || "";
        const claimRaw = document.getElementById('claimData').value || "";

        if (!masterRaw || !claimRaw) {
            alert("Awaiting Data: Please paste both the Packet Data and Claim JSON.");
            return;
        }

        // 1. SURGICAL ISOLATION (Bypass Substitute Notes Globally)
        let orderedZone = masterRaw.replace(/Partner Substitute Items[\s\S]*?(?=Order Type|Stacked Order|Multi-site|Rider|\n\n|$)/ig, '');
        orderedZone = orderedZone.split(/Partner Claim Rate|Rider photos/i)[0].toLowerCase();
        const packetLines = orderedZone.split('\n').filter(l => l.trim().length > 5);

        let scanned = [];
        let notScanned = [];
        let substituted = [];

        // 2. JSON PARSER (Robust block extraction)
        const cClean = claimRaw.replace(/\\n/g, '\n').replace(/["\\[\]{}]/g, ''); 
        let blocks = cClean.split(/\d+\s*:\s*/); 
        if (blocks.length <= 1) blocks = [cClean]; 

        blocks.forEach(b => {
            const bLow = b.toLowerCase();
            
            // Only process valid Missing/Incomplete blocks
            if (blocks.length === 1 || ((bLow.includes("missing") || bLow.includes("incomplete")) && !bLow.includes("reason: late order"))) {
                
                const itemMatch = b.match(/Claimed Items\s*:\s*([\s\S]*?)(?=Claimed Value|Evidence|Outcome|Reason|$)/i);
                const itemsText = itemMatch ? itemMatch[1] : b; 
                
                let itemsList = itemsText.split(/\n+/).map(i => i.trim()).filter(i => i.length > 5);

                // Ensure comma-separated dumps are split correctly
                if (itemsList.length === 1 && itemsList[0].split(/(?:-\s*)?\d+x\s+/).length > 2) {
                    itemsList = itemsList[0].split(/(?=(?:-\s*)?\d+x\s+)/).map(i => i.trim()).filter(i => i.length > 5);
                }

                // 3. MULTI-ITEM SCANNER
                itemsList.forEach(singleItem => {
                    let displayItemName = singleItem.replace(/^-+/, '').trim();
                    
                    let nameParts = singleItem.split(/(?:-\s*)?\d+x\s+/);
                    let productName = "";
                    if (nameParts.length > 1) {
                        productName = nameParts.pop().split(' - £')[0].toLowerCase().trim();
                    } else {
                        productName = singleItem.toLowerCase().trim();
                    }
                    
                    // Exact Phrase Extractor (Language Agnostic - 3 words)
                    let brandPhrase = productName.split(/\s+/).slice(0, 3).join(' ').trim();

                    let foundOnLine = false;
                    let matchedStatus = "substitute"; 
                    
                    if (brandPhrase.length > 2) {
                        packetLines.forEach(line => {
                            let pParts = line.split(/(?:-\s*)?\d+x\s+/);
                            let packetItemName = "";
                            if (pParts.length > 1) {
                                packetItemName = pParts.pop().split(' - £')[0].toLowerCase().trim();
                            } else {
                                packetItemName = line.toLowerCase().trim();
                            }
                            
                            // EXACT MATCH CHECK
                            if (packetItemName !== "" && (packetItemName === productName || packetItemName.includes(productName) || productName.includes(packetItemName))) {
                                foundOnLine = true;
                                if (line.includes("not scanned")) matchedStatus = "not_scanned";
                                else if (line.includes("scanned") && !line.includes("not scanned")) matchedStatus = "scanned";
                                else matchedStatus = "standard"; // Un-tagged items (e.g. Franprix APIs)
                            }
                        });
                    }

                    // Sort into UI Arrays (Standard claims fallback to Not Scanned to trigger correct banners)
                    if (!foundOnLine && brandPhrase.length > 0) {
                        substituted.push(displayItemName);
                    } else if (matchedStatus === "scanned") {
                        scanned.push(displayItemName);
                    } else if (matchedStatus === "not_scanned" || matchedStatus === "standard") {
                        notScanned.push(displayItemName);
                    } else {
                        notScanned.push(displayItemName); 
                    }
                });
            }
        });

        // De-duplicate arrays before rendering
        scanned = [...new Set(scanned)];
        notScanned = [...new Set(notScanned)];
        substituted = [...new Set(substituted)];

        renderList('listScanned', scanned);
        renderList('listNotScanned', notScanned);
        renderList('listSubstituted', substituted);

        // 4. CUSTOM BANNER LOGIC
        const banner = document.getElementById('alertBanner');
        
        if (scanned.length > 0 && notScanned.length === 0 && substituted.length === 0) {
            // ONLY SCANNED
            banner.style.display = 'block';
            banner.style.backgroundColor = '#fef2f2';
            banner.style.color = '#ef4444';
            banner.style.borderColor = '#fecaca';
            banner.innerHTML = '❌ ALL CLAIMED ITEMS WERE SCANNED';
        } 
        else if (substituted.length > 0 && scanned.length === 0 && notScanned.length === 0) {
            // ONLY SUBSTITUTES
            banner.style.display = 'block';
            banner.style.backgroundColor = '#f5f3ff'; 
            banner.style.color = '#8b5cf6'; 
            banner.style.borderColor = '#ddd6fe';
            banner.innerHTML = '🔄 CLAIMING FOR A SUBSTITUTE';
        }
        else if (scanned.length > 0 && notScanned.length > 0 && substituted.length === 0) {
            // SCANNED AND NOT SCANNED
            banner.style.display = 'block';
            banner.style.backgroundColor = '#fffbeb';
            banner.style.color = '#d97706';
            banner.style.borderColor = '#fde68a';
            banner.innerHTML = '⚠️ BOTH SCANNED AND NOT SCANNED ITEMS ARE MISSING';
        }
        else if (substituted.length > 0 && (scanned.length > 0 || notScanned.length > 0)) {
            // SUBSTITUTES + (SCANNED OR NOT SCANNED)
            banner.style.display = 'block';
            banner.style.backgroundColor = '#fffbeb';
            banner.style.color = '#d97706';
            banner.style.borderColor = '#fde68a';
            banner.innerHTML = '⚠️ MIXED CLAIMS: SUBSTITUTE AND OTHER ITEMS';
        }
        else if (notScanned.length > 0 && scanned.length === 0 && substituted.length === 0) {
            // ONLY NOT SCANNED
            banner.style.display = 'block';
            banner.style.backgroundColor = '#eff6ff'; // Light blue
            banner.style.color = '#2563eb'; // Deep blue to match Not Scanned
            banner.style.borderColor = '#bfdbfe';
            banner.innerHTML = '✅ ONLY NOT SCANNED ITEMS ARE MISSING';
        }
        else {
            // Fallback for empty/no data
            banner.style.display = 'none';
        }

    } catch (err) {
        alert("Execution Error: " + err.message + "\nPlease check if the data pasted is correct.");
        console.error(err);
    }
}

function renderList(elementId, itemsArray) {
    const ul = document.getElementById(elementId);
    ul.innerHTML = '';
    
    if (itemsArray.length === 0) {
        ul.innerHTML = '<li class="empty-state">No items detected</li>';
        return;
    }

    itemsArray.forEach(item => {
        const li = document.createElement('li');
        li.innerText = '• ' + item;
        ul.appendChild(li);
    });
}
</script>
</body>
</html>
